services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mas
      POSTGRES_PASSWORD: mas_dev_2024
      POSTGRES_DB: mas_pipeline
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mas -d mas_pipeline"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mas-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: mas-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: /bin/sh
    # Start the daemon, wait for readiness, pull the embedding model on first
    # run (cached in ollama_data afterwards), then wait on the daemon. The
    # healthcheck only flips healthy once the model is actually present.
    command:
      - -c
      - "ollama serve & sleep 5 && ollama pull nomic-embed-text && wait"
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q nomic-embed-text"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 30s

  api:
    build: .
    container_name: mas-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: mas
      POSTGRES_PASSWORD: mas_dev_2024
      POSTGRES_DB: mas_pipeline
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Point embedding at the bundled ollama service by default. Override by
      # setting OPENAI_EMBEDDING_API_BASE before `docker compose up` to use a
      # different endpoint (host ollama, external API, etc.).
      OPENAI_EMBEDDING_API_BASE: ${OPENAI_EMBEDDING_API_BASE:-http://ollama:11434/v1}
    env_file:
      - .env
    volumes:
      - ./agents:/app/agents
      - ./pipelines:/app/pipelines
      - ./projects:/app/projects
      - ./uploads:/app/uploads
      - ./config:/app/config
      - ./skills:/app/skills
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  gateway:
    build: .
    container_name: mas-gateway
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: mas
      POSTGRES_PASSWORD: mas_dev_2024
      POSTGRES_DB: mas_pipeline
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OPENAI_EMBEDDING_API_BASE: ${OPENAI_EMBEDDING_API_BASE:-http://ollama:11434/v1}
    env_file:
      - .env
    volumes:
      - ./agents:/app/agents
      - ./pipelines:/app/pipelines
      - ./projects:/app/projects
      - ./uploads:/app/uploads
      - ./config:/app/config
      - ./skills:/app/skills
    command: ["python", "-m", "src.bus.cli"]

  web:
    build: ./web
    container_name: mas-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-80}:80"

  # ── Monitoring (opt-in) ───────────────────────────────────
  # Start with: docker compose --profile monitoring up
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: mas-prometheus
    restart: unless-stopped
    profiles: ["monitoring"]
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:9090/-/ready"]
      interval: 10s
      timeout: 3s
      retries: 5

  grafana:
    image: grafana/grafana-oss:10.4.10
    container_name: mas-grafana
    restart: unless-stopped
    profiles: ["monitoring"]
    depends_on:
      prometheus:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"

volumes:
  pg_data:
  redis_data:
  ollama_data:
  prometheus_data:
  grafana_data:
