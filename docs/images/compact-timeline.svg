<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="440" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>

  <!-- ═══ Phase 1: Full message list (PG) ═══ -->
  <text x="30" y="36" fill="#334155" font-weight="700" font-size="13">1. Messages grow in PG (append-only log)</text>

  <!-- Message blocks -->
  <rect x="30"  y="50" width="56" height="36" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="58"  y="73" text-anchor="middle" fill="#1e40af" font-size="11">msg 1</text>

  <rect x="92"  y="50" width="56" height="36" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="120" y="73" text-anchor="middle" fill="#1e40af" font-size="11">msg 2</text>

  <rect x="154" y="50" width="56" height="36" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="182" y="73" text-anchor="middle" fill="#1e40af" font-size="11">msg 3</text>

  <text x="224" y="73" fill="#94a3b8" font-size="16">···</text>

  <rect x="250" y="50" width="56" height="36" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="278" y="73" text-anchor="middle" fill="#1e40af" font-size="11">msg 8</text>

  <!-- tool results → micro_compact markers -->
  <rect x="312" y="50" width="66" height="36" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="345" y="68" text-anchor="middle" fill="#92400e" font-size="10">tool result</text>
  <text x="345" y="80" text-anchor="middle" fill="#92400e" font-size="9">[cleared]</text>

  <rect x="384" y="50" width="66" height="36" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="417" y="68" text-anchor="middle" fill="#92400e" font-size="10">tool result</text>
  <text x="417" y="80" text-anchor="middle" fill="#92400e" font-size="9">[cleared]</text>

  <rect x="456" y="50" width="66" height="36" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="489" y="68" text-anchor="middle" fill="#1e40af" font-size="10">tool result</text>
  <text x="489" y="80" text-anchor="middle" fill="#1e40af" font-size="9">[kept]</text>

  <text x="538" y="73" fill="#94a3b8" font-size="16">···</text>

  <rect x="564" y="50" width="56" height="36" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="592" y="73" text-anchor="middle" fill="#1e40af" font-size="11">msg 18</text>

  <rect x="626" y="50" width="56" height="36" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="654" y="73" text-anchor="middle" fill="#1e40af" font-size="11">msg 19</text>

  <rect x="688" y="50" width="56" height="36" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="716" y="73" text-anchor="middle" fill="#1e40af" font-size="11">msg 20</text>

  <!-- micro_compact label -->
  <text x="770" y="60" fill="#f59e0b" font-size="11" font-weight="600">micro_compact</text>
  <text x="770" y="76" fill="#94a3b8" font-size="10">old tool results → [cleared]</text>

  <!-- ═══ Trigger arrow ═══ -->
  <line x1="400" y1="100" x2="400" y2="136" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#arr)"/>
  <text x="415" y="126" fill="#ef4444" font-size="11" font-weight="600">tokens &gt; 85% ctx window → auto_compact</text>

  <!-- ═══ Phase 2: After auto_compact ═══ -->
  <text x="30" y="162" fill="#334155" font-weight="700" font-size="13">2. auto_compact appends summary + boundary (PG keeps everything)</text>

  <rect x="30"  y="176" width="56" height="36" rx="4" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3"/>
  <text x="58"  y="199" text-anchor="middle" fill="#94a3b8" font-size="11">msg 1</text>

  <rect x="92"  y="176" width="56" height="36" rx="4" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3"/>
  <text x="120" y="199" text-anchor="middle" fill="#94a3b8" font-size="11">msg 2</text>

  <text x="162" y="199" fill="#94a3b8" font-size="16">···</text>

  <rect x="188" y="176" width="56" height="36" rx="4" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3"/>
  <text x="216" y="199" text-anchor="middle" fill="#94a3b8" font-size="11">msg 14</text>

  <!-- Summary block -->
  <rect x="260" y="176" width="130" height="36" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="325" y="199" text-anchor="middle" fill="#166534" font-weight="700" font-size="12">SUMMARY</text>

  <!-- Boundary block -->
  <rect x="396" y="176" width="130" height="36" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="461" y="199" text-anchor="middle" fill="#92400e" font-weight="700" font-size="12">BOUNDARY</text>

  <!-- Recent messages kept -->
  <rect x="542" y="176" width="56" height="36" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="570" y="199" text-anchor="middle" fill="#1e40af" font-size="11">msg 15</text>

  <text x="612" y="199" fill="#94a3b8" font-size="16">···</text>

  <rect x="638" y="176" width="56" height="36" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="666" y="199" text-anchor="middle" fill="#1e40af" font-size="11">msg 19</text>

  <rect x="700" y="176" width="56" height="36" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="728" y="199" text-anchor="middle" fill="#1e40af" font-size="11">msg 20</text>

  <!-- "still in PG" label on grey msgs -->
  <text x="140" y="228" text-anchor="middle" fill="#94a3b8" font-size="10" font-style="italic">still in PG, not sent to model</text>

  <!-- ═══ Phase 3: What the model sees (sliced view) ═══ -->
  <text x="30" y="270" fill="#334155" font-weight="700" font-size="13">3. Model sees only the sliced view (from latest boundary)</text>

  <rect x="30" y="284" width="880" height="56" rx="6" fill="#fff" stroke="#3b82f6" stroke-width="2"/>

  <rect x="44" y="294" width="130" height="36" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="109" y="317" text-anchor="middle" fill="#166534" font-weight="700" font-size="12">SUMMARY</text>

  <rect x="188" y="294" width="56" height="36" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="216" y="317" text-anchor="middle" fill="#1e40af" font-size="11">msg 15</text>

  <rect x="250" y="294" width="56" height="36" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="278" y="317" text-anchor="middle" fill="#1e40af" font-size="11">msg 16</text>

  <rect x="312" y="294" width="56" height="36" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="340" y="317" text-anchor="middle" fill="#1e40af" font-size="11">msg 17</text>

  <rect x="374" y="294" width="56" height="36" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="402" y="317" text-anchor="middle" fill="#1e40af" font-size="11">msg 18</text>

  <rect x="436" y="294" width="56" height="36" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="464" y="317" text-anchor="middle" fill="#1e40af" font-size="11">msg 19</text>

  <rect x="498" y="294" width="56" height="36" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="526" y="317" text-anchor="middle" fill="#1e40af" font-size="11">msg 20</text>

  <!-- prompt window label -->
  <text x="820" y="317" text-anchor="middle" fill="#3b82f6" font-weight="600" font-size="12">prompt window</text>

  <!-- Bottom legend -->
  <rect x="30" y="366" width="14" height="14" rx="2" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="50" y="378" fill="#334155" font-size="11">Live message</text>

  <rect x="160" y="366" width="14" height="14" rx="2" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3"/>
  <text x="180" y="378" fill="#334155" font-size="11">In PG only (not sent)</text>

  <rect x="320" y="366" width="14" height="14" rx="2" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="340" y="378" fill="#334155" font-size="11">LLM-generated summary</text>

  <rect x="510" y="366" width="14" height="14" rx="2" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="530" y="378" fill="#334155" font-size="11">Compact boundary marker</text>

  <rect x="710" y="366" width="14" height="14" rx="2" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="730" y="378" fill="#334155" font-size="11">[cleared] = micro_compact</text>

  <!-- Invariant note -->
  <text x="480" y="420" text-anchor="middle" fill="#64748b" font-size="11" font-style="italic">Invariant: PG log only grows. Compaction = append summary + slice the view. No data is ever deleted.</text>
</svg>
