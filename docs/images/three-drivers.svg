<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#64748b"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#3b82f6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="320" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Driver boxes (left) -->
  <rect x="40" y="50" width="160" height="44" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="120" y="77" text-anchor="middle" fill="#1e40af" font-weight="600">Pipeline mode</text>

  <rect x="40" y="138" width="160" height="44" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="120" y="165" text-anchor="middle" fill="#1e40af" font-weight="600">Chat mode</text>

  <rect x="40" y="226" width="160" height="44" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="120" y="253" text-anchor="middle" fill="#1e40af" font-weight="600">ClawBot</text>

  <!-- Converge lines: drivers → SessionRunner -->
  <line x1="200" y1="72" x2="310" y2="160" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="200" y1="160" x2="310" y2="160" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="200" y1="248" x2="310" y2="160" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- SessionRunner (center) -->
  <rect x="318" y="130" width="170" height="60" rx="8" fill="#1e293b" stroke="#1e293b" stroke-width="1.5"/>
  <text x="403" y="156" text-anchor="middle" fill="#f8fafc" font-weight="700" font-size="15">SessionRunner</text>
  <text x="403" y="176" text-anchor="middle" fill="#94a3b8" font-size="11">_MODE_TO_ROLE</text>

  <!-- Arrow: SessionRunner → agent_loop -->
  <line x1="488" y1="160" x2="538" y2="160" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- agent_loop -->
  <rect x="546" y="130" width="140" height="60" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <text x="616" y="156" text-anchor="middle" fill="#334155" font-weight="700" font-size="15">agent_loop</text>
  <text x="616" y="176" text-anchor="middle" fill="#94a3b8" font-size="11">streaming ReAct</text>

  <!-- Fan-out arrows -->
  <line x1="686" y1="145" x2="760" y2="80" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="686" y1="160" x2="760" y2="160" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="686" y1="175" x2="760" y2="240" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output boxes (right) -->
  <rect x="768" y="58" width="150" height="44" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="843" y="85" text-anchor="middle" fill="#166534" font-weight="600">Tools</text>

  <rect x="768" y="138" width="150" height="44" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="843" y="165" text-anchor="middle" fill="#92400e" font-weight="600">Memory</text>

  <rect x="768" y="218" width="150" height="44" rx="6" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
  <text x="843" y="245" text-anchor="middle" fill="#9d174d" font-weight="600">Telemetry</text>

  <!-- Subtitle labels -->
  <text x="120" y="296" text-anchor="middle" fill="#94a3b8" font-size="11">three entrypoints</text>
  <text x="403" y="296" text-anchor="middle" fill="#94a3b8" font-size="11">one runtime</text>
  <text x="843" y="296" text-anchor="middle" fill="#94a3b8" font-size="11">shared infrastructure</text>
</svg>
