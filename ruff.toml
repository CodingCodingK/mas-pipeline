target-version = "py312"
line-length = 100

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "SIM", # flake8-simplify
    "TCH", # flake8-type-checking
]
ignore = [
    "E501",  # line too long (handled by formatter)
]

[lint.per-file-ignores]
"scripts/*.py" = ["E402"]  # sys.path.insert before imports

[lint.isort]
known-first-party = ["src"]

[format]
quote-style = "double"
indent-style = "space"
