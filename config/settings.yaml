# mas-pipeline global settings
# Override with config/settings.local.yaml or environment variables

models:
  strong: gpt-5.4
  medium: gpt-5.4
  light: gpt-5.4

embedding:
  provider: ollama
  model: nomic-embed-text
  dimensions: 768
  api_base: ${OPENAI_EMBEDDING_API_BASE:http://localhost:11434/v1}
  api_key: ${OPENAI_EMBEDDING_API_KEY:}

providers:
  anthropic:
    api_key: ${ANTHROPIC_API_KEY}
    api_base: https://api.anthropic.com
  openai:
    api_key: ${OPENAI_API_KEY}
    api_base: ${OPENAI_API_BASE:https://api.openai.com/v1}
  gemini:
    api_key: ${GEMINI_API_KEY}
    api_base: https://generativelanguage.googleapis.com/v1beta/openai
  deepseek:
    api_key: ${DEEPSEEK_API_KEY}
    api_base: https://api.deepseek.com/v1
  ollama:
    api_base: http://localhost:11434/v1

tavily:
  api_key: ${TAVILY_API_KEY}

database:
  postgres_url: postgresql+psycopg://${POSTGRES_USER:mas}:${POSTGRES_PASSWORD:mas_dev_2024}@${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5433}/${POSTGRES_DB:mas_pipeline}
  redis_url: redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}/0
  # SQLAlchemy pool sizing. Keep pool_size + max_overflow ≤ PG max_connections - 10.
  pool_size: ${DATABASE_POOL_SIZE:20}
  max_overflow: ${DATABASE_MAX_OVERFLOW:40}
  pool_pre_ping: true

agent:
  max_turns: 50
  max_tool_concurrency: 10

compact:
  autocompact_pct: 0.85
  blocking_pct: 0.95
  micro_keep_recent: 5

default_user:
  name: default
  email: admin@mas-pipeline.local

server:
  host: 0.0.0.0
  port: 8000
  reload: true

sandbox:
  enabled: true              # Wrap ShellTool commands with bwrap/sandbox-exec when available
  fail_if_unavailable: false # If true, refuse to start when the platform sandbox binary is missing

# Permission rules — deny-list mode, evaluated by PermissionChecker in NORMAL mode.
# Agents running in BYPASS mode (not used by chat/session paths) are not affected.
# write_file paths are matched against a cwd-relative, realpath-normalized string,
# so `../` traversal and symlinks cannot bypass these rules.
permissions:
  deny:
    # Protected write paths — prevent LLM hallucinated edits to project internals
    - write_file(agents/**)
    - write_file(src/**)
    - write_file(config/**)
    - write_file(openspec/**)
    - write_file(.plan/**)
    - write_file(pipelines/**)
    - write_file(skills/**)
    - write_file(.git/**)
    - write_file(.env*)
    - write_file(.claude/**)
    # Dangerous shell command patterns — second line of defense
    - shell(rm -rf *)
    - shell(sudo *)
    - shell(curl *|*sh*)
    - shell(git push *)
    - shell(* > /etc/*)

# MCP servers — connected by MCPManager at pipeline/session start.
# Servers that fail to start are logged and skipped (non-fatal).
mcp_servers:
  github:
    command: npx
    args: ["-y", "@modelcontextprotocol/server-github"]
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_PAT:}
mcp_default_access: all
