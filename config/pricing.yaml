# Telemetry pricing table — USD per 1K tokens.
#
# Schema:
#   models:
#     "{provider}/{model_name}":
#       input_usd_per_1k_tokens: float
#       output_usd_per_1k_tokens: float
#       cache_read_discount_factor: float  # fraction of input price charged for cache-read tokens (0.1 = 10%)
#
# To add a new model: append a new entry under `models:` using the same schema.
# Run `POST /api/admin/telemetry/reload-pricing` to pick up changes without restarting.
# Missing-model events record cost_usd=null (logged once per unseen pair).
#
# Prices are best-effort snapshots; maintainers should update them as vendors change rates.

